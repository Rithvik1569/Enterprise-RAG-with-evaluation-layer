services:
  - type: web
    name: rag-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: ragdb
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
