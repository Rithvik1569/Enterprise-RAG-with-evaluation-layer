version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: rag_mongo_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: antigravity_secure_password
      MONGO_INITDB_DATABASE: ragdb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: rag_fastapi_backend
    restart: always
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      ENVIRONMENT: production
      MONGODB_URL: mongodb://admin:antigravity_secure_password@db:27017
      DATABASE_NAME: ragdb
      SECRET_KEY: antigravity-rag-secret-key-2024-super-secure-do-not-share
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      UPLOAD_DIR: ./uploads
      CHROMA_DIR: ./chromadb_store
      EMBEDDING_PROVIDER: google
      GEMINI_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/workspace/backend/uploads
      - chroma_data:/workspace/backend/chromadb_store
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: rag_nginx_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodata:
    driver: local
  uploads_data:
    driver: local
  chroma_data:
    driver: local
